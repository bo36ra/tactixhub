<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Tatixhub</title>
    <meta name="description" content="Tatixhub — football team management for coaches." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Tatixhub" />
    <meta property="og:description" content="Tatixhub — football team management for coaches." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Tatixhub" />
    <meta name="twitter:description" content="Tatixhub — football team management for coaches." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://api.fontshare.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@500;600&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root">
      <div id="pre-boot-fallback" style="min-height:100vh;background:#181613;color:#EAE0D0;font-family:monospace;padding:24px;">
        <p>Loading Tatixhub…</p>
        <p style="opacity:0.6;font-size:12px;">If this message never changes or an error appears below, JavaScript failed to start.</p>
        <pre id="pre-boot-error" style="white-space:pre-wrap;color:#f87171;font-size:12px;margin-top:16px;"></pre>
      </div>
    </div>
    <script>
      window.__bootLog = [];
      window.__logBoot = function (msg) {
        window.__bootLog.push(msg);
        var el = document.getElementById('pre-boot-error');
        if (el) el.textContent = window.__bootLog.join('\n');
      };
      window.__logBoot('1. inline script ran');
      window.addEventListener('error', function (e) {
        window.__logBoot('window error: ' + (e.message || e) + ' @ ' + (e.filename || '') + ':' + (e.lineno || ''));
      });
      window.addEventListener('unhandledrejection', function (e) {
        window.__logBoot('unhandled rejection: ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
