<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <defs>
    <clipPath id="badge"><rect x="8" y="8" width="224" height="224" rx="52"/></clipPath>
  </defs>
  <rect x="8" y="8" width="224" height="224" rx="52" fill="#1B7A44"/>
  <g clip-path="url(#badge)">
    <rect x="8"   y="8" width="56" height="224" fill="#20894D"/>
    <rect x="120" y="8" width="56" height="224" fill="#20894D"/>
    <!-- subtle pitch halfway line + center circle, chalk -->
    <circle cx="120" cy="120" r="150" fill="none" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="4"/>
    <line x1="8" y1="120" x2="232" y2="120" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="4"/>
  </g>
  <!-- X — our player marker (chalk) -->
  <g stroke="#FFFFFF" stroke-width="26" stroke-linecap="round">
    <line x1="66" y1="106" x2="128" y2="168"/>
    <line x1="128" y1="106" x2="66" y2="168"/>
  </g>
  <!-- O — opponent marker -->
  <circle cx="180" cy="176" r="17" fill="none" stroke="#FFFFFF" stroke-opacity="0.85" stroke-width="11"/>
  <!-- dashed run-arrow: the play being drawn -->
  <path d="M 106 94 C 126 50, 166 44, 186 68" fill="none" stroke="#FFD84D"
        stroke-width="12" stroke-linecap="round" stroke-dasharray="2 24"/>
  <path d="M 202,90 L 172,74 L 198,56 Z" fill="#FFD84D"/>
</svg>