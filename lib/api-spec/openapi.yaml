openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Coach Planner API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: teams
    description: Team management
  - name: players
    description: Player management
  - name: matches
    description: Match management
  - name: attendance
    description: Attendance management
  - name: goals
    description: Goals management
  - name: cards
    description: Cards and discipline
  - name: playing-time
    description: Playing time management
  - name: dashboard
    description: Dashboard statistics
  - name: members
    description: Team staff members
  - name: notes
    description: Shared staff notes
  - name: notifications
    description: In-app notifications

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Teams
  /teams:
    get:
      operationId: listTeams
      tags: [teams]
      summary: List all teams for authenticated user
      responses:
        "200":
          description: List of teams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Team"
    post:
      operationId: createTeam
      tags: [teams]
      summary: Create a new team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamInput"
      responses:
        "201":
          description: Created team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"

  /teams/{teamId}:
    get:
      operationId: getTeam
      tags: [teams]
      summary: Get a single team
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
    patch:
      operationId: updateTeam
      tags: [teams]
      summary: Update a team
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamUpdate"
      responses:
        "200":
          description: Updated team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
    delete:
      operationId: deleteTeam
      tags: [teams]
      summary: Delete a team
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Players
  /teams/{teamId}/players:
    get:
      operationId: listPlayers
      tags: [players]
      summary: List all players for a team
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of players
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Player"
    post:
      operationId: createPlayer
      tags: [players]
      summary: Add a player to a team
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerInput"
      responses:
        "201":
          description: Created player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  /teams/{teamId}/players/{playerId}:
    patch:
      operationId: updatePlayer
      tags: [players]
      summary: Update a player
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
        - name: playerId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerUpdate"
      responses:
        "200":
          description: Updated player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
    delete:
      operationId: deletePlayer
      tags: [players]
      summary: Delete a player
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
        - name: playerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Matches
  /teams/{teamId}/matches:
    get:
      operationId: listMatches
      tags: [matches]
      summary: List all matches for a team
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of matches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Match"
    post:
      operationId: createMatch
      tags: [matches]
      summary: Add a match to a team
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatchInput"
      responses:
        "201":
          description: Created match
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"

  /teams/{teamId}/matches/{matchId}:
    delete:
      operationId: deleteMatch
      tags: [matches]
      summary: Delete a match
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
        - name: matchId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Player profile
  /players/{playerId}/timeline:
    get:
      operationId: getPlayerTimeline
      tags: [players]
      summary: Get a player's full history — every match/training day connected in one timeline
      parameters:
        - name: playerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Player profile with chronological timeline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerTimeline"

  # Lineups
  /matches/{matchId}/lineup:
    get:
      operationId: getLineup
      tags: [matches]
      summary: Get a match's formation and assigned players
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Formation and lineup entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lineup"
    put:
      operationId: saveLineup
      tags: [matches]
      summary: Replace a match's formation and lineup entries
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [formation, entries]
              properties:
                formation:
                  type: string
                entries:
                  type: array
                  items:
                    type: object
                    required: [playerId, slotIndex]
                    properties:
                      playerId:
                        type: integer
                      slotIndex:
                        type: integer
                        nullable: true
                      isCaptain:
                        type: boolean
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  matchId:
                    type: integer
                  formation:
                    type: string
                  saved:
                    type: integer

  # Attendance
  /teams/{teamId}/attendance:
    get:
      operationId: listAttendance
      tags: [attendance]
      summary: List attendance records for a team
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of attendance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Attendance"
    post:
      operationId: createAttendance
      tags: [attendance]
      summary: Record attendance for a session
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceInput"
      responses:
        "201":
          description: Created attendance record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Attendance"

  /teams/{teamId}/attendance/summary:
    get:
      operationId: getAttendanceSummary
      tags: [attendance]
      summary: Get attendance summary per player
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Attendance summary per player
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceSummary"

  /teams/{teamId}/attendance/schedule:
    get:
      operationId: getAttendanceSchedule
      tags: [attendance]
      summary: Get the attendance schedule — every training/match day with per-day presence
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
        - name: days
          in: query
          required: false
          description: Only include days within the last N days. Omit for full history.
          schema:
            type: integer
      responses:
        "200":
          description: Attendance grouped by day, connecting raw records to per-session presence
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceScheduleEntry"

  # Goals
  /teams/{teamId}/goals:
    get:
      operationId: listGoals
      tags: [goals]
      summary: List all goals for a team
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of goals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Goal"
    post:
      operationId: createGoal
      tags: [goals]
      summary: Add a goal record
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoalInput"
      responses:
        "201":
          description: Created goal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Goal"

  /teams/{teamId}/goals/{goalId}:
    delete:
      operationId: deleteGoal
      tags: [goals]
      summary: Delete a goal record
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
        - name: goalId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /teams/{teamId}/goals/scorers:
    get:
      operationId: getTopScorers
      tags: [goals]
      summary: Get top scorers list for a team
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Top scorers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScorerSummary"

  # Cards
  /teams/{teamId}/cards:
    get:
      operationId: listCards
      tags: [cards]
      summary: List all cards for a team
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of cards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Card"
    post:
      operationId: createCard
      tags: [cards]
      summary: Record a card event
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CardInput"
      responses:
        "201":
          description: Created card record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Card"

  /teams/{teamId}/cards/{cardId}:
    delete:
      operationId: deleteCard
      tags: [cards]
      summary: Delete a card record
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
        - name: cardId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /teams/{teamId}/cards/summary:
    get:
      operationId: getCardsSummary
      tags: [cards]
      summary: Get card summary per player
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cards summary per player
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CardSummary"

  # Playing Time
  /teams/{teamId}/playing-time:
    get:
      operationId: listPlayingTime
      tags: [playing-time]
      summary: List playing time records for a team
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of playing time records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlayingTime"
    post:
      operationId: recordPlayingTime
      tags: [playing-time]
      summary: Record playing time for a match
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayingTimeInput"
      responses:
        "201":
          description: Recorded playing time
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlayingTime"

  /teams/{teamId}/playing-time/summary:
    get:
      operationId: getPlayingTimeSummary
      tags: [playing-time]
      summary: Get playing time summary per player
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Playing time summary per player
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlayingTimeSummary"

  # Dashboard
  /teams/{teamId}/dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get dashboard stats for a team
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  # Team staff members
  /teams/{teamId}/members:
    get:
      operationId: listTeamMembers
      tags: [members]
      summary: List staff members of a team
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of team members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamMember"
    post:
      operationId: addTeamMember
      tags: [members]
      summary: Invite a staff member by email (owner only)
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamMemberInput"
      responses:
        "201":
          description: Created invite
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"

  /teams/{teamId}/members/{memberId}:
    patch:
      operationId: updateTeamMember
      tags: [members]
      summary: Change a member's role (owner only)
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
        - name: memberId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamMemberUpdate"
      responses:
        "200":
          description: Updated member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"
    delete:
      operationId: removeTeamMember
      tags: [members]
      summary: Remove a member or cancel an invite (owner only)
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
        - name: memberId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  # Shared staff notes
  /teams/{teamId}/notes:
    get:
      operationId: listNotes
      tags: [notes]
      summary: List shared notes (pinned first, newest first)
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Note"
    post:
      operationId: createNote
      tags: [notes]
      summary: Create a shared note
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteInput"
      responses:
        "201":
          description: Created note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"

  /teams/{teamId}/notes/{noteId}:
    patch:
      operationId: updateNote
      tags: [notes]
      summary: Update a note (author or owner)
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteUpdate"
      responses:
        "200":
          description: Updated note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
    delete:
      operationId: deleteNote
      tags: [notes]
      summary: Delete a note (author or owner)
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # In-app notifications
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List the current user's notifications (newest first)
      responses:
        "200":
          description: List of notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AppNotification"

  /notifications/unread-count:
    get:
      operationId: getUnreadNotificationsCount
      tags: [notifications]
      summary: Count of unread notifications
      responses:
        "200":
          description: Unread count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnreadCount"

  /notifications/mark-all-read:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "204":
          description: Marked

  /notifications/{notificationId}/read:
    post:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark one notification as read
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated notification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppNotification"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Team:
      type: object
      required: [id, name, userId, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        ageGroup:
          type: ["string", "null"]
        season:
          type: ["string", "null"]
        userId:
          type: string
        createdAt:
          type: string

    TeamInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        ageGroup:
          type: string
        season:
          type: string

    TeamUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        ageGroup:
          type: string
        season:
          type: string

    Player:
      type: object
      required: [id, teamId, name, jerseyNumber, position, status, createdAt]
      properties:
        id:
          type: integer
        teamId:
          type: integer
        name:
          type: string
        jerseyNumber:
          type: integer
        position:
          type: string
          enum: [goalkeeper, defender, midfielder, forward]
        age:
          type: ["integer", "null"]
        nationality:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, injured, suspended]
        createdAt:
          type: string

    PlayerInput:
      type: object
      required: [name, jerseyNumber, position, status]
      properties:
        name:
          type: string
          minLength: 1
        jerseyNumber:
          type: integer
        position:
          type: string
          enum: [goalkeeper, defender, midfielder, forward]
        age:
          type: integer
        nationality:
          type: string
        status:
          type: string
          enum: [active, injured, suspended]

    PlayerUpdate:
      type: object
      properties:
        name:
          type: string
        jerseyNumber:
          type: integer
        position:
          type: string
          enum: [goalkeeper, defender, midfielder, forward]
        age:
          type: integer
        nationality:
          type: string
        status:
          type: string
          enum: [active, injured, suspended]

    Match:
      type: object
      required: [id, teamId, opponent, date, type, ourGoals, theirGoals, createdAt]
      properties:
        id:
          type: integer
        teamId:
          type: integer
        opponent:
          type: string
        date:
          type: string
        type:
          type: string
          enum: [league, friendly, cup]
        formation:
          type: string
        ourGoals:
          type: integer
        theirGoals:
          type: integer
        createdAt:
          type: string

    PlayerTimelineEntry:
      type: object
      required: [date, sessionType, present]
      properties:
        date:
          type: string
        sessionType:
          type: string
          enum: [match, training]
        present:
          type: boolean
        matchId:
          type: integer
        opponent:
          type: string
        matchType:
          type: string
        ourGoals:
          type: integer
        theirGoals:
          type: integer
        minutesPlayed:
          type: integer
        goalsScored:
          type: integer
        yellowCards:
          type: integer
        redCards:
          type: integer

    PlayerTimeline:
      type: object
      required: [player, timeline]
      properties:
        player:
          type: object
          required: [id, name, jerseyNumber, position]
          properties:
            id:
              type: integer
            name:
              type: string
            jerseyNumber:
              type: integer
            position:
              type: string
            age:
              type: integer
            nationality:
              type: string
            status:
              type: string
        timeline:
          type: array
          items:
            $ref: "#/components/schemas/PlayerTimelineEntry"

    LineupEntry:
      type: object
      required: [id, playerId, slotIndex, isCaptain, playerName, jerseyNumber, position]
      properties:
        id:
          type: integer
        playerId:
          type: integer
